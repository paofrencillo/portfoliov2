<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160" width="400" height="160" style="shape-rendering:crispEdges">
  <title>Pixelated Sunglasses Icon</title>

  <!-- Transparent background — no rect fill -->

  <!-- ===== BRIDGE ===== -->
  <rect x="188" y="60" width="24" height="10" fill="#3b2010"/>
  <rect x="188" y="70" width="24" height="10" fill="#4e2e18"/>

  <!-- ===== LEFT LENS ===== -->
  <!-- Browbar top -->
  <rect x="20"  y="20" width="160" height="12" fill="#2e1a0a"/>
  <!-- Metal strip on browbar -->
  <rect x="20"  y="29" width="160" height="5" fill="#c4915a" opacity="0.75"/>
  <!-- Left side -->
  <rect x="10"  y="32" width="10" height="60" fill="#3b2010"/>
  <!-- Right side (inner, toward bridge) -->
  <rect x="180" y="32" width="8"  height="60" fill="#3b2010"/>
  <!-- Bottom frame -->
  <rect x="20"  y="92" width="160" height="10" fill="#3b2010"/>
  <!-- Lens fill -->
  <rect x="20"  y="32" width="160" height="60" fill="#4a2e14" opacity="0.88"/>
  <!-- Highlight pixels (top-left of lens) -->
  <rect x="32"  y="36" width="28"  height="6" fill="#a06030" opacity="0.55"/>
  <rect x="60"  y="36" width="14"  height="6" fill="#b87840" opacity="0.4"/>
  <rect x="32"  y="42" width="14"  height="4" fill="#7a4820" opacity="0.35"/>

  <!-- ===== RIGHT LENS ===== -->
  <!-- Browbar top -->
  <rect x="220" y="20" width="160" height="12" fill="#2e1a0a"/>
  <!-- Metal strip -->
  <rect x="220" y="29" width="160" height="5" fill="#c4915a" opacity="0.75"/>
  <!-- Left side (inner, toward bridge) -->
  <rect x="212" y="32" width="8"  height="60" fill="#3b2010"/>
  <!-- Right side -->
  <rect x="380" y="32" width="10" height="60" fill="#3b2010"/>
  <!-- Bottom frame -->
  <rect x="220" y="92" width="160" height="10" fill="#3b2010"/>
  <!-- Lens fill -->
  <rect x="220" y="32" width="160" height="60" fill="#4a2e14" opacity="0.88"/>
  <!-- Highlight pixels -->
  <rect x="232" y="36" width="28"  height="6" fill="#a06030" opacity="0.55"/>
  <rect x="260" y="36" width="14"  height="6" fill="#b87840" opacity="0.4"/>
  <rect x="232" y="42" width="14"  height="4" fill="#7a4820" opacity="0.35"/>

  <!-- ===== TEMPLES ===== -->
  <rect x="0"   y="42" width="10" height="10" fill="#2e1a0a"/>
  <rect x="390" y="42" width="10" height="10" fill="#2e1a0a"/>

  <!-- ===== NOSE PADS ===== -->
  <rect x="174" y="78" width="8" height="8" fill="#7a5030"/>
  <rect x="218" y="78" width="8" height="8" fill="#7a5030"/>
</svg>
